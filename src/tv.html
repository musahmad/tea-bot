<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tea Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #121218;
            color: #e8e0d8;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            transition: background 0.6s ease;
        }

        /* Activate screen */
        #activate {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            cursor: pointer;
            user-select: none;
        }
        #activate .cup { font-size: 6rem; }
        #activate p { font-size: 1.5rem; opacity: 0.5; margin-top: 1rem; }

        /* Main container */
        #main {
            display: none;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Shared full-screen view base */
        .view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0; left: 0;
            background: #121218;
            z-index: 10;
        }
        .view.active { display: flex; }

        /* Idle view */
        #idle { z-index: 1; display: flex; }

        .cup-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .cup { font-size: 8rem; }
        .steam-wrap {
            display: flex;
            gap: 12px;
            position: absolute;
            top: -40px;
        }
        .steam {
            width: 8px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            animation: rise 2s ease-out infinite;
        }
        .steam:nth-child(2) { animation-delay: 0.5s; height: 50px; }
        .steam:nth-child(3) { animation-delay: 1s; height: 35px; }
        @keyframes rise {
            0%   { transform: translateY(0) scaleX(1); opacity: 0.6; }
            100% { transform: translateY(-60px) scaleX(2); opacity: 0; }
        }
        #idle h1 {
            font-size: 3rem;
            font-weight: 300;
            color: #d4a574;
            letter-spacing: 0.1em;
            margin-top: 1rem;
        }

        /* Teaderboard */
        .board { margin-top: 2rem; text-align: center; }
        .board h2 {
            font-size: 1.6rem;
            color: #d4a574;
            margin-bottom: 1rem;
            font-weight: 400;
        }
        .board-entry {
            font-size: 1.5rem;
            padding: 0.4rem 0;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* Alert view (round start / tea maker) */
        #alert.active {
            animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #alert .alert-cup {
            font-size: 10rem;
            animation: wiggle 0.5s ease-in-out 3;
        }
        #alert h1 {
            font-size: 5rem;
            color: #f0c040;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        #alert .sub {
            font-size: 2.2rem;
            color: #d4a574;
            margin-top: 0.5rem;
            font-weight: 300;
        }
        @keyframes zoomIn {
            0%   { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25%      { transform: rotate(-10deg); }
            75%      { transform: rotate(10deg); }
        }
        .glow { background: radial-gradient(ellipse at center, #2a1a0a 0%, #121218 70%); }

        /* Bids reveal view */
        #bids-view h1 {
            font-size: 3rem;
            color: #f0c040;
            margin-bottom: 2rem;
        }
        .bid-entry {
            font-size: 2rem;
            padding: 0.6rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            animation: slideIn 0.4s ease-out;
        }
        .bid-entry .bid-amount {
            color: #d4a574;
            font-weight: 600;
        }
        @keyframes slideIn {
            0% { opacity: 0; transform: translateX(-30px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* Dice view */
        #dice-view h1 {
            font-size: 2.5rem;
            color: #f0c040;
            margin-bottom: 2rem;
        }
        .dice-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            font-size: 1.8rem;
        }
        .dice-row .dice-user {
            min-width: 120px;
            text-align: right;
        }
        .dice-row .dice-set {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .dice-img {
            width: 64px;
            height: 64px;
            object-fit: contain;
        }
        .dice-total {
            font-size: 1.8rem;
            color: #f0c040;
            font-weight: 700;
            margin-left: 0.5rem;
        }

        /* Penalty view */
        #penalty-view h1 {
            font-size: 3rem;
            color: #f0c040;
            margin-bottom: 2rem;
        }
        .penalty-result {
            font-size: 3rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .penalty-amount {
            color: #d4a574;
            font-weight: 700;
        }

        /* Payments view */
        #payments-view h1 {
            font-size: 3rem;
            color: #f0c040;
            margin-bottom: 2rem;
        }
        .payment-entry {
            font-size: 1.8rem;
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }
        .payment-positive { color: #4caf50; }
        .payment-negative { color: #f44336; }

        /* User display */
        .user-display {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .user-emoji {
            width: 48px;
            height: 48px;
            object-fit: contain;
            vertical-align: middle;
        }
        .user-emoji-sm {
            width: 32px;
            height: 32px;
        }
    </style>
</head>
<body>
    <div id="activate">
        <div class="cup">☕</div>
        <p>Click anywhere to activate</p>
    </div>

    <div id="main">
        <div id="idle" class="view active">
            <div class="cup-wrap">
                <div class="steam-wrap">
                    <div class="steam"></div>
                    <div class="steam"></div>
                    <div class="steam"></div>
                </div>
                <div class="cup">☕</div>
            </div>
            <h1>TEA BOT</h1>
            <div class="board" id="board"></div>
        </div>

        <div id="alert" class="view">
            <div class="alert-cup">☕</div>
            <h1 id="alert-title"></h1>
            <p class="sub" id="alert-sub"></p>
        </div>

        <div id="bids-view" class="view">
            <h1>Revealing Bids...</h1>
            <div id="bids-list"></div>
        </div>

        <div id="dice-view" class="view">
            <h1 id="dice-title"></h1>
            <div id="dice-area"></div>
        </div>

        <div id="penalty-view" class="view">
            <h1>Loser Penalty</h1>
            <div id="penalty-content" class="penalty-result"></div>
        </div>

        <div id="payments-view" class="view">
            <h1>Payments</h1>
            <div id="payments-list"></div>
        </div>
    </div>

    <script>
        let audioCtx;

        document.getElementById('activate').addEventListener('click', () => {
            audioCtx = new AudioContext();
            document.getElementById('activate').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            connect();
        });

        // --- Sound ---
        function playChime() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                const t = now + i * 0.22;
                [1, 2, 3, 4.2].forEach((harmonic, j) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq * harmonic;
                    const vol = [0.25, 0.12, 0.06, 0.03][j];
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(vol, t + 0.005);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.8 / (j + 1));
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + 2);
                });
            });
        }

        // --- View management ---
        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.body.classList.remove('glow');
        }

        function showIdle() {
            showView('idle');
        }

        // --- User rendering ---
        function renderUser(u, small) {
            const cls = small ? 'user-emoji user-emoji-sm' : 'user-emoji';
            if (u.image_url) {
                return '<span class="user-display">'
                    + '<img class="' + cls + '" src="' + escapeHtml(u.image_url) + '"'
                    + ' onerror="this.replaceWith(document.createTextNode(\'' + escapeHtml(u.name) + '\'))"'
                    + ' alt="' + escapeHtml(u.name) + '">'
                    + '</span>';
            }
            return '<span class="user-display">' + escapeHtml(u.name) + '</span>';
        }

        function escapeHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        // --- Dice rendering ---
        function renderDie(value) {
            if (value === 0) {
                return '<img class="dice-img" src="/static/dice/dice-rolling.gif" alt="rolling">';
            }
            return '<img class="dice-img" src="/static/dice/dice-' + value + '.png" alt="' + value + '">';
        }

        // --- Alert ---
        function showAlert(title, subtitleHtml) {
            showView('alert');
            document.getElementById('alert-title').textContent = title;
            document.getElementById('alert-sub').innerHTML = subtitleHtml;
            document.body.classList.add('glow');
            playChime();
        }

        // --- Bids ---
        function showBidsView() {
            document.getElementById('bids-list').innerHTML = '';
            showView('bids-view');
        }

        function appendBid(user, bid) {
            const el = document.getElementById('bids-list');
            const entry = document.createElement('div');
            entry.className = 'bid-entry';
            entry.innerHTML = renderUser(user, false) + ' <span class="bid-amount">' + bid + ' TEA</span>';
            el.appendChild(entry);
        }

        // --- Dice ---
        let diceState = {}; // keyed by user name

        function showDiceView(rollers, tiedBid) {
            diceState = {};
            const area = document.getElementById('dice-area');
            area.innerHTML = '';
            document.getElementById('dice-title').textContent =
                'Tied at ' + tiedBid + '! Rolling dice...';
            showView('dice-view');
        }

        function startDiceRolling(user) {
            const area = document.getElementById('dice-area');
            const row = document.createElement('div');
            row.className = 'dice-row';
            row.id = 'dice-row-' + escapeHtml(user.name);
            row.innerHTML =
                '<span class="dice-user">' + renderUser(user, false) + '</span>'
                + '<span class="dice-set">'
                + renderDie(0) + renderDie(0) + renderDie(0)
                + '</span>'
                + '<span class="dice-total"></span>';
            area.appendChild(row);
            diceState[user.name] = { values: [0, 0, 0] };
        }

        function showDieResult(user, dieIndex, value) {
            const row = document.getElementById('dice-row-' + escapeHtml(user.name));
            if (!row) return;
            const imgs = row.querySelectorAll('.dice-set .dice-img');
            if (imgs[dieIndex]) {
                imgs[dieIndex].outerHTML = renderDie(value);
            }
            if (diceState[user.name]) {
                diceState[user.name].values[dieIndex] = value;
            }
            // Show total after last die
            if (dieIndex === 2 && diceState[user.name]) {
                const total = diceState[user.name].values.reduce((a, b) => a + b, 0);
                row.querySelector('.dice-total').textContent = '= ' + total;
            }
        }

        function showDiceTie(rollers) {
            diceState = {};
            document.getElementById('dice-area').innerHTML = '';
            document.getElementById('dice-title').textContent = 'Tie! Rolling again...';
        }

        // --- Penalty ---
        function showPenaltyRolling() {
            document.getElementById('penalty-content').innerHTML = renderDie(0);
            showView('penalty-view');
        }

        function showPenaltyResult(value) {
            document.getElementById('penalty-content').innerHTML =
                renderDie(value) + ' <span class="penalty-amount">' + value + ' TEA</span>';
        }

        // --- Payments ---
        function showPayments(payments) {
            const el = document.getElementById('payments-list');
            el.innerHTML = '';
            payments.forEach(([user, amount]) => {
                const cls = amount > 0 ? 'payment-positive' : 'payment-negative';
                const emoji = amount > 0 ? '\u{1F911}' : '\u{2639}\u{FE0F}';
                const entry = document.createElement('div');
                entry.className = 'payment-entry';
                entry.innerHTML = renderUser(user, false)
                    + ' <span class="' + cls + '">'
                    + (amount > 0 ? '+' : '') + amount.toFixed(1) + ' TEA ' + emoji
                    + '</span>';
                el.appendChild(entry);
            });
            showView('payments-view');
        }

        // --- Teaderboard ---
        function updateBoard(entries) {
            const el = document.getElementById('board');
            if (!entries || !entries.length) { el.innerHTML = ''; return; }
            const medals = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];
            el.innerHTML = '<h2>Teaderboard</h2>'
                + entries.map(([user, bal], i) =>
                    '<div class="board-entry">'
                    + (medals[i] || '\u00A0\u00A0') + ' '
                    + renderUser(user, true)
                    + ' \u2014 ' + bal.toFixed(1) + ' TEA</div>'
                ).join('');
        }

        // --- Bid reveal state ---
        let firstBid = true;

        // --- SSE connection ---
        function connect() {
            const src = new EventSource('/tv/events');
            src.onmessage = (e) => {
                const ev = JSON.parse(e.data);
                switch (ev.type) {
                    case 'TeaRoundStarted':
                        firstBid = true;
                        showAlert('TEA ROUND!',
                            renderUser(ev.started_by, false)
                            + ' started a round \u2014 place your bids!');
                        break;

                    case 'TeaRoundCancelled':
                        showIdle();
                        break;

                    case 'BidRevealed':
                        if (firstBid) {
                            showBidsView();
                            firstBid = false;
                        }
                        appendBid(ev.user, ev.bid);
                        break;

                    case 'DiceRollAnnounced':
                        showDiceView(ev.rollers, ev.tied_bid);
                        break;

                    case 'DiceRolling':
                        startDiceRolling(ev.user);
                        break;

                    case 'DiceResult':
                        showDieResult(ev.user, ev.die_index, ev.value);
                        break;

                    case 'DiceRollTie':
                        showDiceTie(ev.rollers);
                        break;

                    case 'TeaMakerAnnounced':
                        showAlert('TEA TIME!',
                            renderUser(ev.maker, false)
                            + ' is brewing ' + ev.cups + ' cups!');
                        break;

                    case 'PenaltyRolling':
                        showPenaltyRolling();
                        break;

                    case 'PenaltyRevealed':
                        showPenaltyResult(ev.value);
                        break;

                    case 'PaymentsAnnounced':
                        showPayments(ev.payments);
                        break;

                    case 'Teaderboard':
                        showIdle();
                        updateBoard(ev.entries);
                        break;
                }
            };
        }
    </script>
</body>
</html>
